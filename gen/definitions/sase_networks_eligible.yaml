name: Sase Networks Eligible
spec_endpoint: /organizations/{organizationId}/sase/networks/eligible
rest_endpoint: /organizations/%v/sase/networks/eligible
no_resource: true
no_update: true
no_delete: true
doc_category: Organizations
test_variables: [test_org]
attributes:
  - tf_name: organization_id
    type: String
    id: true
    reference: true
    description: Organization ID
    example: "123456"
    test_value: data.meraki_organization.test.id
  - model_name: remaining
    type: Int64
    data_path: [meta, counts, items]
    description: The number of items in the dataset that are available on subsequent pages
    example: "0"
  - model_name: total
    type: Int64
    data_path: [meta, counts, items]
    description: The total number of items in the dataset
    example: "1"
  - model_name: items
    type: List
    description: List of enrollable networks
    attributes:
      - model_name: name
        type: String
        description: Site name
        example: London Office
      - model_name: networkId
        type: String
        description: Network ID, may not be unique in result set
        example: N_123
      - model_name: type
        type: String
        description: 'The site`s type (one of: `Meraki spoke`, `Meraki hub`, `Meraki template`)'
        example: Meraki spoke
        enum_values: [Meraki hub, Meraki spoke, Meraki template]
      - model_name: street
        type: String
        data_path: [address]
        description: The street address of the site
        example: 123 Main St
      - model_name: model
        type: String
        data_path: [device, primary]
        description: Model of the primary MX device
        example: MX95
      - model_name: name
        type: String
        data_path: [region]
        description: The name of the region
        example: US East
      - model_name: enabled
        type: Bool
        data_path: [routing, defaultRoute]
        description: Whether the site has default route enabled
        example: "true"
      - model_name: type
        type: String
        data_path: [vpn]
        description: The VPN type of the site
        example: hub
        enum_values: [hub, "off", spoke]
test_prerequisites: |
  data "meraki_organization" "test" {
    name = var.test_org
  }
