name: Networks Moves
spec_endpoint: /organizations/{organizationId}/networks/moves
rest_endpoint: /organizations/%v/networks/moves
no_update: true
no_delete: true
doc_category: Organizations
test_tags: [NETWORKS_MOVES]
test_variables: [test_org]
attributes:
  - tf_name: organization_id
    type: String
    id: true
    reference: true
    description: Organization ID
    example: "123456"
    test_value: data.meraki_organization.test.id
  - model_name: simulate
    type: Bool
    description: If true, simulates the network move and validates the operation without committing changes. The network will remain in the source organization.
    example: "false"
  - model_name: id
    type: String
    data_path: [network]
    description: ID of the network to move
    example: N_569142402909112097
  - model_name: id
    type: String
    data_path: [organizations, target]
    description: ID of the organization to which the network is moving
    example: "146308"
test_prerequisites: |
  data "meraki_organization" "test" {
    name = var.test_org
  }
