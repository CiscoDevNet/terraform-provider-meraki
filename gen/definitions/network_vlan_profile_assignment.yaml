# Customize Read() to use byDevice endpoint and filter by vlan profile iname
# Customize Update() to use POST to reassign endpoint and handle removed serials/stacks
# Customize Delete() to reassign devices back to default profile
# Customize data source Read() to use byDevice endpoint
name: Network VLAN Profile Assignment
spec_endpoint: /networks/{networkId}/vlanProfiles/assignments/reassign
rest_endpoint: /networks/%v/vlanProfiles/assignments/reassign
no_data_source: false
no_update: false
no_delete: false
no_import: false
no_read: false
res_description: This resource manages the assignment of a VLAN profile to specific devices and switch stacks within a network.
doc_category: Networks
test_variables: [test_org, test_network, test_switch_1_serial]
attributes:
  - tf_name: network_id
    type: String
    id: false
    reference: true
    description: Network ID
    example: L_123456
    test_value: meraki_network.test.id
  - model_name: iname
    type: String
    data_path: [vlanProfile]
    id: true
    mandatory: true
    description: IName of the VLAN Profile
    example: Profile1
    test_value: meraki_network_vlan_profile.test.iname
  - model_name: serials
    type: Set
    element_type: String
    mandatory: false
    write_empty_list: true
    description: Array of Device Serials
    example: Q234-ABCD-5678
    test_value: '[tolist(meraki_network_device_claim.test.serials)[0]]'
  - model_name: stackIds
    type: Set
    element_type: String
    mandatory: false
    write_empty_list: true
    exclude_test: true
    description: Array of Switch Stack IDs
    example: "1234"
test_prerequisites: |
  data "meraki_organization" "test" {
    name = var.test_org
  }
  resource "meraki_network" "test" {
    organization_id = data.meraki_organization.test.id
    name            = var.test_network
    product_types   = ["switch", "wireless"]
  }
  resource "meraki_network_device_claim" "test" {
    network_id = meraki_network.test.id
    serials    = [var.test_switch_1_serial]
  }
  resource "meraki_network_vlan_profile" "default" {
    network_id = meraki_network.test.id
    iname      = "Default"
    name       = "Default Profile"
    vlan_names = [
      {
        name    = "named-1"
        vlan_id = "1"
      }
    ]
    vlan_groups = [
      {
        name     = "named-group-1"
        vlan_ids = "2,5-7"
      }
    ]
  }
  resource "meraki_network_vlan_profile" "test" {
    network_id = meraki_network_vlan_profile.default.network_id
    iname      = "Profile1"
    name       = "Test Profile"
    vlan_names = [
      {
        name    = "named-1"
        vlan_id = "1"
      }
    ]
    vlan_groups = [
      {
        name     = "named-group-1"
        vlan_ids = "2,5-7"
      }
    ]
  }
