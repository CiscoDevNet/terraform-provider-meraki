name: Organization Integrations Deployed
spec_endpoint: /organizations/{organizationId}/integrations/deployed
rest_endpoint: /organizations/%v/integrations/deployed
no_resource: true
no_update: true
no_delete: true
doc_category: Organizations
test_variables: [test_org]
attributes:
  - tf_name: organization_id
    type: String
    id: true
    reference: true
    description: Organization ID
    example: "123456"
    test_value: data.meraki_organization.test.id
  - model_name: remaining
    type: Int64
    data_path: [meta, counts, items]
    description: The number of objects that are available on subsequent pages
    example: "10"
  - model_name: total
    type: Int64
    data_path: [meta, counts, items]
    description: The total number of available objects
    example: "100"
  - model_name: items
    type: List
    description: A deployed integration
    attributes:
      - model_name: id
        type: String
        description: ID for integration
        example: "98765"
      - model_name: name
        type: String
        description: Name of integration
        example: OAuth Application
      - model_name: provider
        type: String
        description: Integration provider. One of Cisco, Genea, partner
        example: partner
        enum_values: [Cisco, Genea, partner]
      - model_name: type
        type: String
        description: Identifier for integration type. One of Axis, Catalyst SD-WAN, Cisco Spaces, Genea, OAuth, PagerDuty, Secure Access, Secure Connect, Splunk, XDR
        example: OAuth
        enum_values: [Axis, Catalyst SD-WAN, Cisco Spaces, Genea, OAuth, PagerDuty, Secure Access, Secure Connect, Splunk, XDR]
      - model_name: tags
        type: List
        element_type: String
        description: Integration types
        example: Wayfinding
test_prerequisites: |
  data "meraki_organization" "test" {
    name = var.test_org
  }
